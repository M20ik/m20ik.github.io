<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт-переходник</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px auto;
            max-width: 600px;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 5px;
            animation: pulse 1.5s infinite alternate;
        }
        button:hover {
            background-color: #0056b3;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать на сайт-переходник!</h1>
    <p>Выберите, куда вы хотите перейти:</p>
    <button onclick="window.location.href = 'https://www.example1.com';">Перейти на Example 1</button>
    <button onclick="window.location.href = 'https://www.example2.com';">Перейти на Example 2</button>
    <button onclick="window.location.href = 'https://www.example3.com';">Перейти на Example 3</button>
</body>
</html>
