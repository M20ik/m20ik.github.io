<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realme 8i</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 90%;
            margin: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            background-color: #3a4e69;
            color: #fff;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 5px;
            width: calc(100% - 20px);
            max-width: 200px;
            border-radius: 3px;
            display: inline-block;
        }
        button:hover {
            background-color: #50607e;
        }
        @media (min-width: 600px) {
            h1 {
                font-size: 32px;
            }
            p {
                font-size: 18px;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать на сайт-переходник!</h1>
        <p>Сайт для ссылок на Realme 8i, нажми куда нужно попасть <3:</p>
        <button onclick="window.location.href = 'https://eu.dl.twrp.me/spaced/twrp-3.7.0_11-0-spaced.img.html';">TWRP</button>
        <button onclick="window.location.href = 'https://github.com/bkerler/mtkclient';">MTK client</button>
        <button onclick="window.location.href = 'https://github.com/daynix/UsbDk/releases';">UsbDk</button>
        <button onclick="window.location.href = 'https://t.me/realme8ifiles/2';">SP Flash Tool</button>
        <button onclick="window.location.href = 'https://developer.android.com/tools/releases/platform-tools';">Platform Tools</button>
        <button onclick="window.location.href = 'https://4pda.to/forum/index.php?showtopic=1037437';">4PDA</button>
    </div>
</body>
</html>
