<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт-переходник</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 90%;
            margin: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            background-color: #3a4e69;
            color: #fff;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 5px;
            width: calc(100% - 20px);
            max-width: 200px;
            border-radius: 3px;
            display: inline-block;
        }
        button:hover {
            background-color: #50607e;
        }
        @media (min-width: 600px) {
            h1 {
                font-size: 32px;
            }
            p {
                font-size: 18px;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                display: block;
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать на сайт-переходник!</h1>
        <p>Выберите, куда вы хотите перейти:</p>
        <button onclick="window.location.href = 'https://www.example1.com';">Перейти на Example 1</button>
        <button onclick="window.location.href = 'https://www.example2.com';">Перейти на Example 2</button>
        <button onclick="window.location.href = 'https://www.example3.com';">Перейти на Example 3</button>
        <button onclick="window.location.href = 'https://www.example4.com';">Перейти на Example 4</button>
        <button onclick="window.location.href = 'https://www.example5.com';">Перейти на Example 5</button>
    </div>
</body>
</html>
